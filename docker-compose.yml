services:
  # PostgreSQL 16 — main database
  postgres:
    image: postgres:16-alpine
    container_name: aiact-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiact
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d aiact']
      interval: 5s
      timeout: 3s
      retries: 10

  # Gotenberg — HTML → PDF (self-hosted)
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: aiact-gotenberg
    restart: unless-stopped
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 5

  # App — Node.js backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiact-app
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/aiact
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      WORKOS_REDIRECT_URI: ${WORKOS_REDIRECT_URI:-http://localhost:3001/callback}
      WORKOS_WEBHOOK_SECRET: ${WORKOS_WEBHOOK_SECRET:-}
      GOTENBERG_URL: http://gotenberg:3000
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-compliance-docs}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-fsn1}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    ports:
      - '8000:8000'
    volumes:
      - ./server:/app/server
      - ./app:/app/app
      - ./package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8000/health']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
