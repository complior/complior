name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect changes ──────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ts-engine: ${{ steps.filter.outputs.ts-engine }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            ts-engine:
              - 'engine/core/**'

  # ── Rust ──────────────────────────────────────────
  rust-fmt:
    name: Rust Format
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  rust-security:
    name: Rust Security Audit
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── TypeScript Engine ────────────────────────────────
  ts-engine-check:
    name: Engine (typecheck + lint + test)
    needs: changes
    if: needs.changes.outputs.ts-engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      # TODO: re-enable after resolving ~50 accumulated type errors
      # - run: cd engine/core && npx tsc --noEmit
      - run: cd engine/core && npx vitest run --exclude '**/e2e/**'

  # ── Security ─────────────────────────────────────────
  npm-audit:
    name: npm Security Audit
    needs: changes
    if: needs.changes.outputs.ts-engine == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install && cd engine/core && npm audit --audit-level=critical

  # ── Version consistency ──────────────────────────────
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all versions match
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          ENGINE_VER=$(node -p "require('./engine/core/package.json').version")
          NPM_VER=$(node -p "require('./engine/npm/package.json').version")

          echo "Cargo.toml:          $CARGO_VER"
          echo "engine/core:         $ENGINE_VER"
          echo "engine/npm:          $NPM_VER"

          MISMATCH=0
          if [ "$CARGO_VER" != "$ENGINE_VER" ]; then echo "❌ Cargo.toml != engine/core"; MISMATCH=1; fi
          if [ "$CARGO_VER" != "$NPM_VER" ]; then echo "❌ Cargo.toml != engine/npm"; MISMATCH=1; fi

          if [ "$MISMATCH" -eq 1 ]; then
            echo ""
            echo "All version fields must match. Update them before merging."
            exit 1
          fi
          echo "✅ All versions match: $CARGO_VER"

  # ── Gate ─────────────────────────────────────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - rust-fmt
      - rust-clippy
      - rust-test
      - rust-security
      - ts-engine-check
      - npm-audit
      - version-check
    steps:
      - name: Evaluate results
        run: |
          # Skip check for jobs that were skipped due to path filters
          check_job() {
            local result="$1"
            local name="$2"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "❌ $name: $result"
              return 1
            fi
            echo "✅ $name: $result"
            return 0
          }

          FAILED=0
          check_job "${{ needs.rust-fmt.result }}" "rust-fmt" || FAILED=1
          check_job "${{ needs.rust-clippy.result }}" "rust-clippy" || FAILED=1
          check_job "${{ needs.rust-test.result }}" "rust-test" || FAILED=1
          check_job "${{ needs.rust-security.result }}" "rust-security" || FAILED=1
          check_job "${{ needs.ts-engine-check.result }}" "ts-engine-check" || FAILED=1
          check_job "${{ needs.npm-audit.result }}" "npm-audit" || FAILED=1
          check_job "${{ needs.version-check.result }}" "version-check" || FAILED=1

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more checks failed"
            exit 1
          fi
          echo ""
          echo "All checks passed"
