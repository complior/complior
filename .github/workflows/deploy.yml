name: Build and Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'app/**'
      - 'Dockerfile.production'
      - 'package*.json'
  workflow_dispatch:

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/complior-backend:latest
            ghcr.io/${{ github.repository_owner }}/complior-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/openclaw/complior-prod

            echo "=== Pull new image ==="
            docker pull ghcr.io/${{ github.repository_owner }}/complior-backend:${{ github.sha }}

            echo "=== Tag as latest ==="
            docker tag \
              ghcr.io/${{ github.repository_owner }}/complior-backend:${{ github.sha }} \
              ghcr.io/${{ github.repository_owner }}/complior-backend:latest

            echo "=== Restart backend ==="
            docker compose up -d --no-deps --wait backend

            echo "=== Run migrations ==="
            docker compose exec -T backend node app/setup.js

            echo "=== Cleanup ==="
            docker image prune -f

            echo "=== Done: ${{ github.sha }} ==="

      - name: Smoke test
        run: |
          sleep 10
          curl -sf https://api.complior.ai/health || exit 1
          echo "Smoke test passed"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /home/openclaw/complior-prod
            echo "=== ROLLBACK ==="
            PREV=$(docker images ghcr.io/${{ github.repository_owner }}/complior-backend \
              --format "{{.Tag}}" | grep -v latest | sort | tail -2 | head -1)
            docker tag \
              ghcr.io/${{ github.repository_owner }}/complior-backend:$PREV \
              ghcr.io/${{ github.repository_owner }}/complior-backend:latest
            docker compose up -d --no-deps backend
            echo "=== Rolled back to: $PREV ==="
