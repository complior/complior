name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hetzner Cloud
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /home/openclaw/PROJECT

            # Pull latest code
            git fetch origin main
            git checkout main
            git pull origin main

            # Build and restart services (old containers serve until new ones are ready)
            docker compose -f docker-compose.production.yml build --no-cache backend frontend
            docker compose -f docker-compose.production.yml up -d --no-deps backend
            docker compose -f docker-compose.production.yml up -d --no-deps frontend

            # Run database setup (idempotent migrations + seeds)
            docker compose -f docker-compose.production.yml exec -T backend node app/setup.js

            # Wait for health checks
            sleep 5
            docker compose -f docker-compose.production.yml exec -T backend \
              wget --quiet --tries=3 --spider http://127.0.0.1:8000/health

            # Cleanup old images
            docker image prune -f

      - name: Verify deployment
        run: |
          sleep 15
          curl -sf https://app.complior.ai/health || exit 1

      - name: Notify status
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "Deployment successful"
          else
            echo "Deployment failed — check logs"
            exit 1
          fi
