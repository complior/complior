name: Feature Request
description: Suggest a feature for Complior
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's your use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Scanner (static analysis)
        - Eval (dynamic testing)
        - Fix (auto-remediation)
        - Agent Passport
        - SDK (@complior/sdk)
        - CLI / UX
        - Documentation
        - CI/CD Integration
        - Other
    validations:
      required: true
