<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complior — AI Act Compliance Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; max-width: 480px; padding: 2rem; }
    .logo { font-size: 2rem; font-weight: 700; color: #818cf8; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; color: #94a3b8; margin-bottom: 2rem; }
    .status { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
    .status h2 { font-size: 1rem; color: #818cf8; margin-bottom: 0.5rem; }
    .status p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }
    .api { margin-top: 1.5rem; font-size: 0.85rem; color: #64748b; }
    .api a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Complior</div>
    <div class="tagline">EU AI Act Compliance Platform</div>
    <div class="status">
      <h2>Platform launching soon</h2>
      <p>Backend API is live. Frontend is being deployed.</p>
    </div>
    <div class="api">API Health: <a href="/health">/health</a></div>
  </div>
</body>
</html>
