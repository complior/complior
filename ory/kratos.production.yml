version: v1.3.1

serve:
  public:
    base_url: https://app.complior.ai/.ory/kratos/public
    cors:
      enabled: true
      allowed_origins:
        - https://app.complior.ai
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
        - X-Request-Id
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: https://app.complior.ai/
  allowed_return_urls:
    - https://app.complior.ai

  methods:
    password:
      enabled: true
    code:
      enabled: true
      config:
        lifespan: 15m

  flows:
    registration:
      enabled: true
      ui_url: https://app.complior.ai/auth/register
      lifespan: 10m
      after:
        password:
          hooks:
            - hook: session
            - hook: web_hook
              config:
                url: http://backend:8000/api/auth/webhook
                method: POST
                body: file:///etc/config/kratos/webhook-body.jsonnet
                auth:
                  type: api_key
                  config:
                    name: X-Webhook-Secret
                    value: file:///etc/config/kratos/webhook-secret
                    in: header
                can_interrupt: false
                response:
                  ignore: true
        code:
          hooks:
            - hook: session
            - hook: web_hook
              config:
                url: http://backend:8000/api/auth/webhook
                method: POST
                body: file:///etc/config/kratos/webhook-body.jsonnet
                auth:
                  type: api_key
                  config:
                    name: X-Webhook-Secret
                    value: file:///etc/config/kratos/webhook-secret
                    in: header
                can_interrupt: false
                response:
                  ignore: true

    login:
      ui_url: https://app.complior.ai/auth/login
      lifespan: 10m

    verification:
      enabled: true
      ui_url: https://app.complior.ai/auth/verify
      lifespan: 1h

    recovery:
      enabled: true
      ui_url: https://app.complior.ai/auth/recovery
      lifespan: 1h
      use: code

    settings:
      ui_url: https://app.complior.ai/settings
      privileged_session_max_age: 15m

    logout:
      after:
        default_browser_return_url: https://app.complior.ai/auth/login

    error:
      ui_url: https://app.complior.ai/auth/error

log:
  level: warning
  format: json

secrets:
  cookie:
    - ${SECRETS_COOKIE}
  cipher:
    - ${SECRETS_CIPHER}

session:
  lifespan: 24h
  cookie:
    name: aiact_session
    same_site: Lax
    domain: app.complior.ai

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: ${COURIER_SMTP_CONNECTION_URI}
    from_address: noreply@complior.ai
    from_name: Complior
  template_override_path: /etc/config/kratos/templates

hashers:
  argon2:
    parallelism: 2
    memory: 262144KB
    iterations: 3
    salt_length: 16
    key_length: 32
