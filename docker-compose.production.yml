services:
  # PostgreSQL 16 — production database
  postgres:
    image: postgres:16-alpine
    container_name: complior-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: complior
      POSTGRES_USER: complior
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - complior_net
    # No ports exposed — only accessible within Docker network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U complior -d complior']
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - postgres
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_statement=ddl
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - max_connections=100
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Gotenberg — HTML → PDF (self-hosted)
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: complior-gotenberg
    restart: unless-stopped
    networks:
      - complior_net
    # No ports exposed — only accessible within Docker network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  # Backend — Fastify API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: complior-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgres://complior:${DB_PASSWORD}@postgres:5432/complior
      GOTENBERG_URL: http://gotenberg:3000
    ports:
      - '8000:8000'
    networks:
      - complior_net
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  pgdata:
    driver: local

networks:
  complior_net:
    driver: bridge
